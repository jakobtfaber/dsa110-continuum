<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{title}</title>
    <style>
      {shared_css}

      /* Template-specific overrides */
      body {{
        max-width: 1200px;
        margin: 0 auto;
        padding: var(--dsa-spacing-lg);
      }}

      header {{
        border-bottom: 2px solid var(--dsa-primary);
        margin-bottom: var(--dsa-spacing-xl);
        padding-bottom: var(--dsa-spacing-md);
      }}

      .meta {{
        color: var(--dsa-text-muted);
        font-size: 0.9em;
      }}

      .figure {{
        text-align: center;
        margin: var(--dsa-spacing-lg) 0;
      }}

      .figure img {{
        max-width: 100%;
        height: auto;
        border: 1px solid var(--dsa-border);
        border-radius: var(--dsa-radius);
        box-shadow: var(--dsa-shadow);
      }}

      .figure-caption {{
        font-style: italic;
        color: var(--dsa-text-secondary);
        margin-top: var(--dsa-spacing-sm);
      }}

      .data-table {{
        width: 100%;
        border-collapse: collapse;
        margin: var(--dsa-spacing-lg) 0;
      }}

      .data-table th, .data-table td {{
        border: 1px solid var(--dsa-border);
        padding: var(--dsa-spacing-sm) var(--dsa-spacing-md);
        text-align: left;
      }}

      .data-table th {{
        background-color: var(--dsa-bg-paper);
        color: var(--dsa-primary);
        font-weight: 600;
      }}

      .data-table caption {{
        caption-side: top;
        font-weight: bold;
        padding: var(--dsa-spacing-sm);
      }}

      .data-table tr:nth-child(even) {{
        background-color: var(--dsa-bg-paper);
      }}

      .data-table tr:hover {{
        background-color: var(--dsa-bg-surface);
      }}

      .warning {{
        background-color: var(--dsa-warning-bg);
        border: 1px solid var(--dsa-warning-border);
        padding: var(--dsa-spacing-md);
        border-radius: var(--dsa-radius);
        margin: var(--dsa-spacing-md) 0;
        color: #856404;
      }}

      .error {{
        background-color: var(--dsa-error-bg);
        border: 1px solid var(--dsa-error-border);
        padding: var(--dsa-spacing-md);
        border-radius: var(--dsa-radius);
        margin: var(--dsa-spacing-md) 0;
        color: #721c24;
      }}

      .success {{
        background-color: var(--dsa-success-bg);
        border: 1px solid var(--dsa-success-border);
        padding: var(--dsa-spacing-md);
        border-radius: var(--dsa-radius);
        margin: var(--dsa-spacing-md) 0;
        color: #155724;
      }}

      footer {{
        margin-top: var(--dsa-spacing-xl);
        padding-top: var(--dsa-spacing-lg);
        border-top: 1px solid var(--dsa-border);
        color: var(--dsa-text-disabled);
        font-size: 0.85em;
      }}

      {extra_css}
    </style>
  </head>
  <body>
    <header>
      <h1>{title}</h1>
      <div class="meta">
        <p>Generated: {date} | Author: {author}</p>
        {observation_line} {version_line}
      </div>
    </header>

    {content}

    <footer>
      <p>Generated by DSA-110 Continuum Imaging Pipeline v{version}</p>
    </footer>
  </body>
</html>
